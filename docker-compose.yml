name: onde_morar

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/find_ideal_estate
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-60}
      REDIS_URL: redis://redis:6379/0
      MAPTILER_API_KEY: ${MAPTILER_API_KEY:-local-dev-key}
      VALHALLA_URL: ${VALHALLA_URL:-http://host.docker.internal:8002}
      OTP_URL: ${OTP_URL:-http://otp:8080}
      DISPLAY: ":99"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./infra:/app/infra
      - ./alembic.ini:/app/alembic.ini:ro
      - ./platforms.yaml:/app/platforms.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "1gb"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/apps/api/src", "--reload-dir", "/app/packages/contracts"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: find_ideal_estate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d find_ideal_estate"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    env_file: .env
    working_dir: /web
    environment:
      - VITE_API_BASE=http://localhost:8000
      - VITE_MAPTILER_API_KEY=${VITE_MAPTILER_API_KEY:-${MAPTILER_API_KEY:-local-dev-key}}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/web
      - /web/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

networks:
  default:
    name: imovel-ideal

volumes:
  pg_data:
