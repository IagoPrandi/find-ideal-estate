name: onde_morar

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/find_ideal_estate
      REDIS_URL: redis://redis:6379/0
      MAPTILER_API_KEY: ${MAPTILER_API_KEY:-local-dev-key}
      VALHALLA_URL: ${VALHALLA_URL:-http://valhalla:8002}
      OTP_URL: ${OTP_URL:-http://otp:8080}
      DISPLAY: ":99"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./infra:/app/infra
      - ./alembic.ini:/app/alembic.ini:ro
    shm_size: "1gb"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: find_ideal_estate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d find_ideal_estate"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    environment:
      - VITE_API_BASE=http://localhost:8000
      - VITE_MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

networks:
  default:
    name: imovel-ideal

volumes:
  pg_data:
